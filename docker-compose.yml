services:
  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-8080}:80"

  backend:
    build:
      context: ./Backend
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/restoconnect}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_MAX_AGE_MS: ${SESSION_MAX_AGE_MS:-2592000000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-30d}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SMTP_SERVICE: ${SMTP_SERVICE:-gmail}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    volumes:
      - backend_logs:/app/logs
      - backend_profile_pictures:/app/public/profile-pictures
      - backend_restaurant_images:/app/public/restaurant-images
      - backend_uploads:/app/public/uploads

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: restoconnect
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  backend_logs:
  backend_profile_pictures:
  backend_restaurant_images:
  backend_uploads:
  mongo_data:
  redis_data:
