services:
  - type: web
    name: restoconnect-api
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 30d
      - key: COOKIE_SAME_SITE
        value: none
      - key: COOKIE_SECURE
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: SESSION_MAX_AGE_MS
        value: "2592000000"
      - key: REDIS_URL
        fromService:
          name: restoconnect-redis
          type: keyvalue
          property: connectionString
      - key: CACHE_ENABLED
        value: "true"
      - key: CACHE_DEFAULT_TTL_SECONDS
        value: "120"
      - key: PERF_RUN_LABEL
        value: render_cache_enabled
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SMTP_SERVICE
        value: gmail
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: STRIPE_SECRET_KEY
        sync: false

  - type: keyvalue
    name: restoconnect-redis
    ipAllowList: []
